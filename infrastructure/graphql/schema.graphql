type Query {
  getAsiento(id: ID!): Asiento
  obtenerAsiento(TenantId: String!, Ejercicio: String!, IdAsiento: String!): Asiento
  listarSubcuentas(TenantId: String!): [Subcuenta!]!
  obtenerMayor(TenantId: String!, Ejercicio: String!, SubcuentaId: String!): MayorResultado!
  obtenerBalanceSumasSaldos(TenantId: String!, Ejercicio: String!): [BalanceLinea!]!
  listarEmpresas: [Empresa!]!
  obtenerDiario(TenantId: String!, Ejercicio: String!): [Apunte!]!
  exportarDiario(TenantId: String!, Ejercicio: String!): String!
  calcularModelo303(TenantId: String!, Ejercicio: String!, Trimestre: Int!): Modelo303Result!
  calcularModelo390(TenantId: String!, Ejercicio: String!): Modelo390Result!
  calcularModelo347(TenantId: String!, Ejercicio: String!): [Modelo347Result!]!
  listarPlantillas(TenantId: String!): [Plantilla!]!
  obtenerUrlDescarga(S3Key: String!): String!
  listarFacturas(TenantId: String!): [Factura!]!
  listarActivos(TenantId: String!, Ejercicio: String!): [Activo!]!
  obtenerDashboardStats(TenantId: String!, Ejercicio: String!): DashboardStats!
  obtenerIngresosMensuales(TenantId: String!, Ejercicio: String!): [ChartData!]!
}

type Mutation {
  crearAsiento(input: CrearAsientoInput!): Asiento!
  cerrarEjercicio(TenantId: String!, EjercicioActual: String!, EjercicioNuevo: String!): Boolean!
  editarAsiento(input: EditarAsientoInput!): Asiento!
  borrarAsiento(TenantId: String!, Ejercicio: String!, IdAsiento: String!): Boolean!
  crearPlantilla(input: CrearPlantillaInput!): Plantilla!
  borrarPlantilla(TenantId: String!, TemplateId: String!): Boolean!
  alternarPunteo(TenantId: String!, Ejercicio: String!, IdAsiento: String!, Linea: String!, Estado: Boolean!): Boolean!
  generarUrlSubida(TenantId: String!, Ejercicio: String!, IdAsiento: String!, NombreArchivo: String!): PresignedUrlResponse!
  procesarFicheroBanco(contenidoBase64: String!): [MovimientoBancario!]!
  migrarContaPlus(TenantId: String!, Ejercicio: String!, FileKey: String!): Boolean!
  extraerOcrFactura(S3Key: String!): OcrResult!
  crearEmpresa(input: CrearEmpresaInput!): Empresa!
  editarEmpresa(input: EditarEmpresaInput!): Empresa!
  borrarEmpresa(TenantId: String!): Boolean!
  crearFactura(input: CrearFacturaInput!): Factura!
  registrarPagoFactura(TenantId: String!, Ejercicio: String!, FacturaId: String!, FechaPago: String!, CuentaBanco: String!): Boolean!
  crearActivo(input: CrearActivoInput!): Activo!
}

type Empresa {
  TenantId: String!
  Nombre: String!
  RazonSocial: String
  NIF: String
  Direccion: String
  Poblacion: String
  CodigoPostal: String
  Rol: String
}

input CrearEmpresaInput {
  Nombre: String!
  RazonSocial: String
  NIF: String
  Direccion: String
  Poblacion: String
  CodigoPostal: String
}

input EditarEmpresaInput {
  TenantId: String!
  Nombre: String!
  RazonSocial: String
  NIF: String
  Direccion: String
  Poblacion: String
  CodigoPostal: String
}

type Subcuenta {
  PK: String!
  SK: String!
  CodSubcuenta: String!
  Descripcion: String!
  Nombre: String!
  Nif: String
}

type OcrResult {
  NIF: String
  Total: Float
  Base: Float
  TextoCompleto: String!
}

type Modelo303Result {
  Trimestre: Int!
  IvaDevengado: Float!
  IvaDeducible: Float!
  Resultado: Float!
}

type Modelo390Result {
  Ejercicio: String!
  IvaDevengado: Float!
  IvaDeducible: Float!
  Resultado: Float!
}

type Modelo347Result {
  SubcuentaId: String!
  Nombre: String!
  Nif: String
  TotalOperaciones: Float!
}

type Asiento {
  PK: String!
  SK: String!
  IdAsiento: String!
  Fecha: String!
  Observaciones: String
  Usuario: String!
  Estado: String!
  Apuntes: [Apunte!]
  Documentos: [DocumentoAdjunto!]
}

type DocumentoAdjunto {
  S3Key: String!
  Nombre: String!
}

type PresignedUrlResponse {
  Url: String!
  S3Key: String!
}

type MovimientoBancario {
  Fecha: String!
  Importe: Float!
  Concepto: String!
  Referencia: String
  SugerenciaIdAsiento: String
  SugerenciaLinea: String
  Fiabilidad: String
}

type CentroCosteDistribucion {
  CodigoProyecto: String!
  Porcentaje: Float!
  ImporteAsignado: Float!
}

type Apunte {
  PK: String!
  SK: String!
  IdAsiento: String!
  Linea: String!
  Fecha: String!
  SubcuentaId: String!
  Concepto: String!
  Documento: String
  Debe: Float!
  Haber: Float!
  Punteado: Boolean
  DistribucionAnalitica: [CentroCosteDistribucion!]
}

input CentroCosteInput {
  CodigoProyecto: String!
  Porcentaje: Float!
}

input ApunteInput {
  SubcuentaId: String!
  Concepto: String!
  Documento: String
  Debe: Float!
  Haber: Float!
  DistribucionAnalitica: [CentroCosteInput!]
}

input CrearAsientoInput {
  TenantId: String!
  Ejercicio: String!
  Fecha: String!
  Observaciones: String
  Usuario: String!
  Apuntes: [ApunteInput!]!
}

input EditarAsientoInput {
  TenantId: String!
  Ejercicio: String!
  IdAsiento: String!
  Fecha: String!
  Observaciones: String
  Usuario: String!
  Apuntes: [ApunteInput!]!
}

type MayorLinea {
   IdAsiento: String!
   Linea: String!
   Fecha: String!
   Concepto: String!
   Documento: String
   Debe: Float!
   Haber: Float!
   Saldo: Float!
   Punteado: Boolean
}

type MayorResultado {
   SubcuentaId: String!
   SaldoFinal: Float!
   Apuntes: [MayorLinea!]!
}

type BalanceLinea {
  SubcuentaId: String!
  Descripcion: String!
  SumaDebe: Float!
  SumaHaber: Float!
  SaldoDeudor: Float!
  SaldoAcreedor: Float!
  Nivel: String!
}

type PlantillaLinea {
  SubcuentaId: String!
  Concepto: String!
  Porcentaje: Float!
  Columna: String! # "DEBE" o "HABER"
}

type Plantilla {
  PK: String!
  SK: String!
  TemplateId: String!
  NombrePlantilla: String!
  Lineas: [PlantillaLinea!]!
}

input PlantillaLineaInput {
  SubcuentaId: String!
  Concepto: String!
  Porcentaje: Float!
  Columna: String!
}

input CrearPlantillaInput {
  TenantId: String!
  NombrePlantilla: String!
  Lineas: [PlantillaLineaInput!]!
}

type Contacto {
  Nombre: String!
  CuentaContable: String!
}

type LineaFactura {
  Concepto: String!
  Base: Float!
  TipoIVA: Float!
  ImporteIVA: Float!
  Total: Float!
}

type Factura {
  PK: String!
  SK: String!
  TenantId: String!
  IdFactura: String!
  Numero: String!
  Tipo: String!
  Fecha: String!
  Contacto: Contacto!
  Base: Float!
  IVA: Float!
  Total: Float!
  Estado: String!
  EstadoPago: String!
  FechaVencimiento: String!
  Lineas: [LineaFactura!]
  IdAsiento: String
}

type Activo {
  PK: String!
  SK: String!
  Id: String!
  TenantId: String!
  Ejercicio: String!
  Nombre: String!
  CuentaContable: String!
  ValorAdquisicion: Float!
  MesesAmortizacion: Int!
  CuotaMensual: Float!
  FechaAlta: String!
  Estado: String!
  MesesAmortizados: Int!
}

type DashboardStats {
  TotalIngresos: Float!
  TotalGastos: Float!
  PendienteCobro: Float!
  PendientePago: Float!
}

type ChartData {
  mes: String!
  valor: Float!
}

type Vencimiento {
  TenantId: String!
  IdVencimiento: String!
  IdFactura: String!
  FechaVencimiento: String!
  Importe: Float!
  Estado: String!
}

input LineaFacturaInput {
  Concepto: String!
  Base: Float!
  TipoIVA: Float!
}

input CrearFacturaInput {
  TenantId: String!
  Ejercicio: String!
  Usuario: String!
  Tipo: String!
  Numero: String!
  Fecha: String!
  FechaVencimiento: String
  NombreContacto: String!
  CuentaContableContacto: String!
  Lineas: [LineaFacturaInput!]!
}

input CrearActivoInput {
  TenantId: String!
  Ejercicio: String!
  Nombre: String!
  CuentaContable: String!
  ValorAdquisicion: Float!
  MesesAmortizacion: Int!
  FechaAlta: String!
}

